name: Release installers

# Build the desktop app for each OS, then publish them to the GitHub Release in
# one step. Triggered by pushing a version tag (e.g. `npm version patch && git
# push --follow-tags`).
on:
  push:
    tags: ['v*']

permissions:
  contents: write # publish the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Builds are UNSIGNED. Do NOT set CSC_LINK / APPLE_* here as empty values —
      # empty signing vars make electron-builder attempt (and fail) signing on
      # macOS. When you have certificates, add them as repo secrets and a guarded
      # env block (see BUILD.md); until then, leave signing off entirely.
      #
      # --publish never: on a tag push electron-builder otherwise defaults to
      # `--publish onTagOrDraft` and tries to upload to GitHub, which fails for
      # lack of a GH_TOKEN. Publishing is done once by the `release` job below.
      - name: Build installers
        run: npm run dist -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.blockmap
            dist/*.yml

  # Publish once, after all builds — avoids 3 jobs racing to create the Release.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
