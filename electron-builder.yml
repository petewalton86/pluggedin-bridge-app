appId: app.pluggedin.bridge
productName: PluggedIn Desk Bridge
copyright: Copyright © 2026 Pete Walton

directories:
  output: dist
  buildResources: build

# Only ship what the app needs (electron + these). No runtime npm deps.
files:
  - electron/**
  - renderer/**
  - core.mjs
  - osc.mjs
  - udp.mjs
  - tcp.mjs
  - x32.mjs
  - xair.mjs
  - yamaha.mjs
  - ah.mjs
  - package.json

win:
  target:
    - nsis
    - portable
  icon: build/icon.png

mac:
  target: dmg
  category: public.app-category.music
  icon: build/icon.png

linux:
  target: AppImage
  category: AudioVideo
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# Code signing is env-driven and left as a TODO (see BUILD.md):
#   Windows: CSC_LINK + CSC_KEY_PASSWORD
#   macOS:   CSC_LINK + CSC_KEY_PASSWORD, then notarize with APPLE_ID +
#            APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID
